<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Would You Lie to Me? - Join Game</title>
        <link rel="stylesheet" href="/style.css" />
    </head>
    <body>
        <main>
            <h1>Would You Lie to Me?</h1>
            <input
                type="text"
                id="username-input"
                class="nickname-input"
                placeholder="Enter Nickname"
            />
            
            <div class="card" style="margin-top: 20px;">
                <h3 style="margin-bottom: 5px;">Room Settings (Only for Host)</h3>
                <p style="font-size: 13px; color: #64748b; margin-bottom: 10px;">
                    Configure these settings before creating a new room.
                </p>
                <div style="margin-top: 10px;">
                    <label style="font-size: 14px; font-weight: 600;">Max Round Timer:</label>
                    <select id="max-time-limit">
                        <option value="60" selected>1 Minute</option>
                        <option value="120">2 Minutes</option>
                        <option value="180">3 Minutes</option>
                        <option value="300">5 Minutes</option>
                        <option value="0">No Timer</option>
                    </select>
                </div>
                <div style="margin-top: 10px;">
                    <label style="font-size: 14px; font-weight: 600;">Winning Score (Points):</label>
                    <input type="number" id="win-score" value="5" min="1" max="100">
                </div>
                <div style="margin-top: 10px;">
                    <label style="font-size: 14px; font-weight: 600;">Max Rounds Limit:</label>
                    <input type="number" id="max-rounds" placeholder="Default (Players × 2)" min="1" max="100">
                </div>
            </div>

            <div class="options-row">
                <div class="option-card">
                    <button onclick="createGame()">Create New Room</button>
                </div>
                <div class="option-card minimal">OR</div>
                <div class="option-card">
                    <input
                        type="text"
                        id="game-id-input"
                        maxlength="5"
                        placeholder="5-character Room Code"
                        style="text-align: center; text-transform: uppercase"
                        oninput="validateRoomCode()"
                    />
                    <button
                        onclick="joinGame()"
                        class="btn-alt"
                        id="join-btn"
                        disabled
                    >
                        Join Existing Room
                    </button>
                </div>
            </div>
        </main>
        <footer>
            <div class="about-text">
                A party game of truth, lies, and deduction.</br>
                Gather your friends and see who can spot the fib!
            </div>
            <div class="copyright">New Generation Softwares &copy; 2026</div>
        </footer>
        <script src="/auth.js"></script>
    </body>
</html>
