<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Would You Lie to Me? - Join Game</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body class="landing-page">
    <main class="glass-panel">
      <h1>Would You Lie to Me? <span class="version-badge">v0.2</span></h1>
      <p class="text-center font-size-14 text-muted margin-bottom-20">
        <a href="/changelog.html" class="changelog-link">What's New in v0.2?</a>
      </p>
      <input
        type="text"
        id="username-input"
        class="glass-input nickname-input"
        placeholder="Enter Nickname"
      />

      <div class="glass-options-row">
        <div class="glass-option-card">
          <button id="create-game-btn" class="glass-btn primary">
            Create New Room
          </button>
        </div>
        <div class="glass-divider">
          <span>OR</span>
        </div>
        <div class="glass-option-card">
          <input
            type="text"
            id="game-id-input"
            maxlength="5"
            placeholder="ABCDE"
            class="glass-input text-center text-transform-uppercase"
          />
          <button class="glass-btn secondary" id="join-btn" disabled>
            Join Existing Room
          </button>
        </div>
      </div>
    </main>
    <footer class="glass-footer">
      <div class="about-text">
        A party game of truth, lies, and deduction.<br />
        Gather your friends and see who can spot the fib!
      </div>
      <div class="copyright">New Generation Softwares &copy; 2026</div>
    </footer>
    <script src="/utils.js"></script>
    <script src="/auth.js"></script>
  </body>
</html>
