<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Would You Lie to Me? - Join Game</title>
        <link rel="stylesheet" href="/style.css" />
    </head>
    <body>
        <main>
            <h1>Would You Lie to Me?</h1>
            <input
                type="text"
                id="username-input"
                class="nickname-input"
                placeholder="Enter Nickname"
            />
            <div class="options-row">
                <div class="option-card">
                    <button onclick="createGame()">Create New Room</button>
                </div>
                <div class="option-card minimal">OR</div>
                <div class="option-card">
                    <input
                        type="text"
                        id="game-id-input"
                        maxlength="5"
                        placeholder="5-character Room Code"
                        style="text-align: center; text-transform: uppercase"
                        oninput="validateRoomCode()"
                    />
                    <button
                        onclick="joinGame()"
                        class="btn-alt"
                        id="join-btn"
                        disabled
                    >
                        Join Existing Room
                    </button>
                </div>
            </div>
        </main>
        <footer>
            <div class="about-text">
                A party game of truth, lies, and deduction.</br>
                Gather your friends and see who can spot the fib!
            </div>
            <div class="copyright">New Generation Softwares &copy; 2026</div>
        </footer>
        <script src="/auth.js"></script>
    </body>
</html>
