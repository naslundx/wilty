<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Would You Lie to Me? - Lobby</title>
        <link rel="stylesheet" href="/style.css" />
    </head>
    <body>
        <h1>The Waiting Room</h1>
        <div class="card">
            <p>Share this Room Code with friends:</p>
            <div
                id="lobby-code-display"
                class="highlight-box font-size-24 text-center letter-spacing-2"
            ></div>
        </div>

        <div class="card">
            <h3>Add your own statements</h3>
            <p class="font-size-14 text-muted">
                These are linked to this specific game and may be randomly
                chosen.
            </p>
            <div class="flex-group">
                <input
                    type="text"
                    id="statement-input"
                    placeholder="e.g., I once used AI to make this game."
                />
                <button
                    id="submit-statement-btn"
                    class="width-auto white-space-nowrap"
                >
                    Add Secret
                </button>
            </div>
        </div>

        <div id="creator-config" class="card display-none">
            <h3>Room System Settings</h3>
            <p class="font-size-14 text-muted">
                Select statement pool categories to include:
            </p>
            <div class="checkbox-card">
                <input type="checkbox" id="cat-casual" value="Casual" checked />
                <label for="cat-casual"
                    ><strong>Casual</strong> (Lighthearted/Fun)</label
                >
            </div>
            <div class="checkbox-card">
                <input
                    type="checkbox"
                    id="cat-work"
                    value="Work & School"
                    checked
                />
                <label for="cat-work"
                    ><strong>Work & School</strong> (Professional
                    Mishaps)</label
                >
            </div>
            <div class="checkbox-card">
                <input type="checkbox" id="cat-adult" value="Adult" />
                <label for="cat-adult"
                    ><strong>Adult / Spicy</strong> (Grown-ups only)</label
                >
            </div>
            <br />
            <button
                id="start-game-btn"
                class="bg-success"
            >
                Start!
            </button>
        </div>

        <div class="card">
            <h3>Active Connected Players</h3>
            <ul
                id="players-list"
                class="padding-left-20 line-height-2"
            ></ul>
        </div>

        <div class="card">
            <h3>Session Controls</h3>
            <button id="leave-game-btn" class="btn-danger display-none">Leave Game</button>
            <button id="end-game-btn" class="btn-danger display-none">End Game</button>
        </div>
        <script src="/utils.js"></script>
        <script src="/lobby.js"></script>
    </body>
</html>
