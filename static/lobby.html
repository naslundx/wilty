<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Would You Lie to Me? - Lobby</title>
        <link rel="stylesheet" href="/style.css" />
    </head>
    <body>
        <h1>The Waiting Room</h1>
        <div class="card">
            <p>Share this Room Code with friends:</p>
            <div
                id="lobby-code-display"
                class="highlight-box font-size-24 text-center letter-spacing-2"
            ></div>
        </div>

        <div class="card">
            <h3>Add your own statements</h3>
            <p class="font-size-14 text-muted">
                These are linked to this specific game and may be randomly
                chosen.
            </p>
            <div class="flex-group">
                <input
                    type="text"
                    id="statement-input"
                    placeholder="e.g., I once used AI to make this game."
                />
                <button
                    id="submit-statement-btn"
                    class="width-auto white-space-nowrap"
                >
                    Add Secret
                </button>
            </div>
            <div class="margin-top-10">
                <label class="font-size-14 text-muted">
                    <input type="checkbox" id="statement-personal-checkbox" checked />
                    Only apply to me (I will be the storyteller)
                </label>
            </div>
        </div>

        <div id="game-details-card" class="card display-none">
            <h3>Game Settings</h3>
            <div id="game-details-content" class="font-size-14 line-height-1-6">
                <!-- Filled by JS -->
            </div>
        </div>

        <div id="creator-config" class="card display-none">
            <h3>Room System Settings</h3>
            
            <div class="margin-bottom-15 padding-bottom-15 border-bottom">
                <div class="margin-top-10">
                    <label class="font-size-14 font-weight-600">Max Round Timer:</label>
                    <select id="max-time-limit">
                        <option value="60" selected>1 Minute</option>
                        <option value="120">2 Minutes</option>
                        <option value="180">3 Minutes</option>
                        <option value="300">5 Minutes</option>
                        <option value="0">No Timer</option>
                    </select>
                </div>
                <div class="margin-top-10">
                    <label class="font-size-14 font-weight-600">Winning Score (Points):</label>
                    <input type="number" id="win-score" value="5" min="1" max="100">
                </div>
                <div class="margin-top-10">
                    <label class="font-size-14 font-weight-600">Max Rounds Limit:</label>
                    <input type="number" id="max-rounds" placeholder="Default (Players × 2)" min="1" max="100">
                </div>
                <button id="update-settings-btn" class="margin-top-15 btn-alt">
                    Update Settings
                </button>
            </div>

            <p class="font-size-14 text-muted">
                Select statement pool categories to include:
            </p>
            <div class="checkbox-card">
                <input type="checkbox" id="cat-casual" value="Casual" checked />
                <label for="cat-casual"
                    ><strong>Casual</strong> (Lighthearted/Fun)</label
                >
            </div>
            <div class="checkbox-card">
                <input
                    type="checkbox"
                    id="cat-work"
                    value="Work & School"
                    checked
                />
                <label for="cat-work"
                    ><strong>Work & School</strong> (Professional
                    Mishaps)</label
                >
            </div>
            <div class="checkbox-card">
                <input type="checkbox" id="cat-adult" value="Adult" />
                <label for="cat-adult"
                    ><strong>Adult / Spicy</strong> (Grown-ups only)</label
                >
            </div>
            <br />
            <button
                id="start-game-btn"
                class="bg-success"
            >
                Start!
            </button>
        </div>

        <div class="card">
            <h3>Active Connected Players</h3>
            <ul
                id="players-list"
                class="padding-left-20 line-height-2"
            ></ul>
        </div>

        <div class="card">
            <h3>Session Controls</h3>
            <button id="leave-game-btn" class="btn-danger display-none">Leave Game</button>
            <button id="end-game-btn" class="btn-danger display-none">End Game</button>
        </div>
        <script src="/utils.js"></script>
        <script src="/lobby.js"></script>
    </body>
</html>
